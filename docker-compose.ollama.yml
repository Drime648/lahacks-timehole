services:
  ollama:
    image: ollama/ollama:latest
    container_name: timehole-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  ollama-pull-gemma:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - ollama pull gemma3:1b
    restart: "no"

volumes:
  ollama-data:
